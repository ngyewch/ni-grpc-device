name: Build

on:
  push:
    branches: [ main ]
    tags: [ '*' ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up mise
        uses: jdx/mise-action@v3

      - name: nfpm-helper cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/nfpm-helper
          key: ${{ runner.os }}-nfpm-helper
      
      - name: Package
        run: task package

      - name: Release
        uses: softprops/action-gh-release@v2
        if: github.ref_type == 'tag'
        with:
          files: |
            build/ni-grpc-device-server_*.deb
            build/ni-grpc-device-server_*.rpm
